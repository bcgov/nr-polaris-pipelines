name: Sync Maven Packages to Artifactory

on:
  workflow_dispatch:
    inputs:
      repositories:
        description: 'Comma-separated list of repositories to scan (owner/repo)'
        required: false
        default: ''
      package:
        description: 'Optional Maven package filter (groupId:artifactId or name)'
        required: false
        default: ''
      version:
        description: 'Optional comma-separated list of versions (ex. 1.0.0, 2.0.0)'
        required: false
        default: ''
  # schedule:
  #   # Run daily at 3 AM UTC
  #   - cron: '0 3 * * *'

env:
  GITHUB_REGISTRY: https://maven.pkg.github.com
  ARTIFACTORY_REGISTRY: ${{ secrets.ARTIFACTORY_MAVEN_REGISTRY }}

jobs:
  sync-maven-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up inputs
        id: setup
        run: |
          if [ -n "${{ github.event.inputs.repositories }}" ]; then
            echo "repositories=${{ github.event.inputs.repositories }}" >> $GITHUB_OUTPUT
          else
            # Default repositories to scan (customize this list)
            echo "repositories=bcgov-nr/polaris-pipelines,bcgov-nr/action-builder-ghcr" >> $GITHUB_OUTPUT
          fi
          # Package filter (optional)
          if [ -n "${{ github.event.inputs.package }}" ]; then
            echo "package=${{ github.event.inputs.package }}" >> $GITHUB_OUTPUT
          else
            echo "package=" >> $GITHUB_OUTPUT
          fi
          # Version filter (optional)
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=" >> $GITHUB_OUTPUT
          fi

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                        http://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>\${env.GITHUB_ACTOR}</username>
                <password>\${env.GITHUB_TOKEN}</password>
              </server>
              <server>
                <id>artifactory</id>
                <username>\${env.ARTIFACTORY_USERNAME}</username>
                <password>\${env.ARTIFACTORY_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Scan and sync Maven packages
        env:
          GITHUB_TOKEN: ${{ secrets.GHCR_PAT }}
          GITHUB_ACTOR: ${{ github.actor }}
          ARTIFACTORY_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
          ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
          REPOSITORIES: ${{ steps.setup.outputs.repositories }}
          PACKAGE_FILTER: ${{ steps.setup.outputs.package }}
          VERSION_FILTER: ${{ steps.setup.outputs.version }}
        run: |
          set -e

          echo "Starting Maven package sync process..."

          if [ -n "$PACKAGE_FILTER" ]; then
            echo "Package filter enabled: '$PACKAGE_FILTER'"
          else
            echo "No package filter provided; syncing all packages found."
          fi

          if [ -n "$VERSION_FILTER" ]; then
            echo "Version filter enabled: '$VERSION_FILTER'"
            # Remove all whitespace and split by comma
            VERSION_FILTER=$(tr -d [:blank:] <<< "$VERSION_FILTER")
            IFS=',' read -ra VERSION_FILTER_ARRAY <<< "$VERSION_FILTER"
          else
            echo "No version filter provided; syncing all versions found."
          fi

          # Create sync tracking file
          SYNC_LOG="maven-sync-log-$(date +%Y%m%d-%H%M%S).txt"
          echo "Maven sync started at $(date)" > "$SYNC_LOG"

          # Split repositories by comma
          IFS=',' read -ra REPO_ARRAY <<< "$REPOSITORIES"

          test_gh_limit_warning() {
            if [ "$1" -ge 10000 ]; then
              echo "::warning ::GitHub API may be limited to 10000 packages"
              echo "See https://docs.github.com/en/rest/packages/packages?apiVersion=2022-11-28"
            fi
          }

          for REPO in "${REPO_ARRAY[@]}"; do
            REPO=$(echo "$REPO" | xargs) # Trim whitespace
            echo "================================================"
            echo "Processing repository: $REPO"
            echo "================================================"

            # Get all packages for the repository
            OWNER=$(echo "$REPO" | cut -d'/' -f1)
            REPO_NAME=$(echo "$REPO" | cut -d'/' -f2)

            # Fetch Maven packages from GitHub with pagination (accumulate into variable)
            echo "Fetching Maven packages from $REPO (paginated)..."
            PACKAGES=""

            if ! PACKAGES_API_RESPONSE=$(gh api \
              --paginate \
              --slurp \
              --cache 90s \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/orgs/$OWNER/packages?package_type=maven" \
              2>/dev/null); then

              echo "::warning ::Unable to fetch org packages"
              echo "Response: $PACKAGES_API_RESPONSE"
              echo "FAILED (org packages api): $OWNER" >> "$SYNC_LOG"

              { read -r ERR_MSG; read -r ERR_STATUS; } < <(jq -r '.[0] | .message, .status' <<< "$PACKAGES_API_RESPONSE")
              if [ "$ERR_MSG" = "Not Found" -a "$ERR_STATUS" -eq 404 ]; then
                echo "No packages found for org $OWNER, trying user packages (paginated)..."
                if ! PACKAGES_API_RESPONSE=$(gh api \
                  --paginate \
                  --slurp \
                  --cache 90s \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "/users/$OWNER/packages?package_type=maven" \
                  2>/dev/null); then

                  echo "::warning ::Unable to fetch user packages"
                  echo "Response: $PACKAGES_API_RESPONSE"
                  echo "FAILED (user packages api): $OWNER" >> "$SYNC_LOG"
                  continue
                fi
              else
                continue
              fi
            fi
            test_gh_limit_warning $(jq -r 'reduce .[] as $page (0; . + ($page | length))' <<< "$PACKAGES_API_RESPONSE")
            PACKAGES=$(jq -r '.[].[] | select(.repository.name == "'$REPO_NAME'") | .name' 2>/dev/null <<< "$PACKAGES_API_RESPONSE")

            # Process each package (names only) - loop over variable
            while IFS= read -r PACKAGE; do
              if [ -z "$PACKAGE" ]; then
                continue
              fi

              # Get all versions for this package
              VERSIONS=""

              # Remove quotes if present (gh --jq outputs JSON strings by default)
              PACKAGE_NAME=$(echo "$PACKAGE" | tr -d '"')

              # Derive groupId and artifactId from name (format: groupId.artifactId)
              if [[ "$PACKAGE_NAME" == *.* ]]; then
                ARTIFACT_ID=${PACKAGE_NAME##*.}
                GROUP_ID=${PACKAGE_NAME%.*}
              else
                echo "  Skipping: Cannot derive group/artifact from name '$PACKAGE_NAME'"
                continue
              fi

              echo "Processing package: $PACKAGE_NAME"
              echo "  Group ID: $GROUP_ID"
              echo "  Artifact ID: $ARTIFACT_ID"

              # Apply optional package filter (match by full name or groupId:artifactId)
              if [ -n "$PACKAGE_FILTER" ]; then
                if [ "$PACKAGE_FILTER" != "$GROUP_ID:$ARTIFACT_ID" ] && [ "$PACKAGE_FILTER" != "$PACKAGE_NAME" ]; then
                  echo "  Skipping: does not match filter '$PACKAGE_FILTER'"
                  continue
                fi
              fi


              if ! VERSIONS_API_RESPONSE=$(gh api \
                --paginate \
                --slurp \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/orgs/$OWNER/packages/maven/$GROUP_ID.$ARTIFACT_ID/versions" \
                2>/dev/null); then

                echo "::warning ::Unable to fetch org package versions for $OWNER::$GROUP_ID.$ARTIFACT_ID"
                echo "Response: $VERSIONS_API_RESPONSE"
                echo "FAILED (org versions api): $OWNER::$GROUP_ID:$ARTIFACT_ID" >> "$SYNC_LOG"

                { read -r ERR_MSG; read -r ERR_STATUS; } < <(jq -r '.[0] | .message, .status' <<< "$VERSIONS_API_RESPONSE")
                if [ "$ERR_MSG" = "Not Found" -a "$ERR_STATUS" -eq 404 ]; then
                  echo "No versions found for org $OWNER, trying user packages (paginated)..."
                  if ! VERSIONS_API_RESPONSE=$(gh api \
                    --paginate \
                    --slurp \
                    -H "Accept: application/vnd.github+json" \
                    -H "X-GitHub-Api-Version: 2022-11-28" \
                    "/users/$OWNER/packages/maven/$GROUP_ID.$ARTIFACT_ID/versions" \
                    2>/dev/null); then

                    echo "::warning ::Unable to fetch user package versions for $OWNER::$GROUP_ID.$ARTIFACT_ID"
                    echo "Response: $VERSIONS_API_RESPONSE"
                    echo "FAILED (user versions api): $OWNER::$GROUP_ID:$ARTIFACT_ID" >> "$SYNC_LOG"
                    continue
                  fi
                else
                  continue
                fi
              fi
              VERSIONS=$(jq -r '.[].[].name | select(test("-(alpha|beta|rc|snapshot)"; "i") | not)' <<< "$VERSIONS_API_RESPONSE")

              if [ -z "$VERSIONS" ]; then
                echo "  No valid versions found for $PACKAGE_NAME"
                continue
              fi

              # Sync each version - loop over variable
              while IFS= read -r VERSION; do
                if [ -z "$VERSION" ]; then
                  continue
                fi

                if [ -n "$VERSION_FILTER_ARRAY" ]; then
                  FOUND_FILTERED_VERSION=0
                  for FILTERED_VERSION in "${VERSION_FILTER_ARRAY[@]}"; do
                    if [[ "$VERSION" == "$FILTERED_VERSION" ]]; then
                      FOUND_FILTERED_VERSION=1
                      break
                    fi
                  done
                  if [ "$FOUND_FILTERED_VERSION" != "1" ]; then
                    echo "  Skipping version $VERSION: does not match filter '$VERSION_FILTER'"
                    continue
                  fi
                fi

                echo "  Syncing version: $VERSION"

                GROUP_PATH=$(echo "$GROUP_ID" | tr '.' '/')

                # Download from GitHub Packages
                TEMP_DIR=$(mktemp -d)

                ARTIFACT_NAME_URL="https://maven.pkg.github.com/$OWNER/$REPO_NAME/$GROUP_PATH/$ARTIFACT_ID/$VERSION/${ARTIFACT_ID}-${VERSION}"
                TEMP_ARTIFACT_NAME="$TEMP_DIR/${ARTIFACT_ID}-${VERSION}"

                # Try to download the POM file first
                POM_URL="$ARTIFACT_NAME_URL.pom"

                if curl -f -L -H "Authorization: Bearer $GITHUB_TOKEN" \
                     "$POM_URL" \
                     -o "${TEMP_ARTIFACT_NAME}.pom" 2>/dev/null; then
                  echo "    ✓ Downloaded POM from GitHub"

                  # Download JAR file
                  JAR_URL="${ARTIFACT_NAME_URL}.jar"
                  curl -f -L -H "Authorization: Bearer $GITHUB_TOKEN" \
                       "$JAR_URL" \
                       -o "${TEMP_ARTIFACT_NAME}.jar" 2>/dev/null || echo "    (No JAR file found)"

                  # Download sources if available
                  SOURCES_URL="${ARTIFACT_NAME_URL}-sources.jar"
                  curl -f -L -H "Authorization: Bearer $GITHUB_TOKEN" \
                       "$SOURCES_URL" \
                       -o "${TEMP_ARTIFACT_NAME}-sources.jar" 2>/dev/null || echo "    (No sources JAR found)"

                  # Download ear if available
                  EAR_URL="${ARTIFACT_NAME_URL}.ear"
                  curl -f -L -H "Authorization: Bearer $GITHUB_TOKEN" \
                       "$EAR_URL" \
                       -o "${TEMP_ARTIFACT_NAME}.ear" 2>/dev/null || echo "    (No EAR file found)"

                  # Download war if available
                  WAR_URL="${ARTIFACT_NAME_URL}.war"
                  curl -f -L -H "Authorization: Bearer $GITHUB_TOKEN" \
                       "$WAR_URL" \
                       -o "${TEMP_ARTIFACT_NAME}.war" 2>/dev/null || echo "    (No WAR file found)"


                  # Upload to Artifactory using mvn deploy:deploy-file
                  for FILE in "$TEMP_DIR"/*; do
                    if [ ! -f "$FILE" ]; then
                      continue
                    fi

                    FILENAME=$(basename "$FILE")

                    if [[ "$FILENAME" == *.pom ]]; then
                      # Deploy POM
                      if mvn deploy:deploy-file \
                           -DgroupId="$GROUP_ID" \
                           -DartifactId="$ARTIFACT_ID" \
                           -Dversion="$VERSION" \
                           -Dpackaging=pom \
                           -Dfile="$FILE" \
                           -DrepositoryId=artifactory \
                           -Durl="${ARTIFACTORY_REGISTRY}" \
                           -s ~/.m2/settings.xml \
                           --batch-mode 2>&1; then
                        echo "    ✓ Uploaded POM to Artifactory"
                      else
                        echo "    ✗ Failed to upload POM"
                      fi
                    elif [[ "$FILENAME" == *-sources.jar ]]; then
                      # Deploy sources
                      if mvn deploy:deploy-file \
                           -DgroupId="$GROUP_ID" \
                           -DartifactId="$ARTIFACT_ID" \
                           -Dversion="$VERSION" \
                           -Dclassifier=sources \
                           -Dpackaging=jar \
                           -Dfile="$FILE" \
                           -DrepositoryId=artifactory \
                           -Durl="${ARTIFACTORY_REGISTRY}" \
                           -s ~/.m2/settings.xml \
                           --batch-mode 2>&1; then
                        echo "    ✓ Uploaded sources JAR to Artifactory"
                      else
                        echo "    ✗ Failed to upload sources JAR"
                      fi
                    elif [[ "$FILENAME" == *.jar ]]; then
                      # Deploy main JAR
                      if mvn deploy:deploy-file \
                           -DgroupId="$GROUP_ID" \
                           -DartifactId="$ARTIFACT_ID" \
                           -Dversion="$VERSION" \
                           -Dpackaging=jar \
                           -Dfile="$FILE" \
                           -DrepositoryId=artifactory \
                           -Durl="${ARTIFACTORY_REGISTRY}" \
                           -s ~/.m2/settings.xml \
                           --batch-mode 2>&1; then
                        echo "    ✓ Uploaded JAR to Artifactory"
                        echo "SUCCESS: $GROUP_ID:$ARTIFACT_ID:$VERSION (jar)" >> "$SYNC_LOG"
                      else
                        echo "    ✗ Failed to upload JAR"
                        echo "FAILED (jar upload): $GROUP_ID:$ARTIFACT_ID:$VERSION" >> "$SYNC_LOG"
                      fi
                    elif [[ "$FILENAME" == *.ear ]]; then
                      # Deploy main EAR
                      if mvn deploy:deploy-file \
                           -DgroupId="$GROUP_ID" \
                           -DartifactId="$ARTIFACT_ID" \
                           -Dversion="$VERSION" \
                           -Dpackaging=ear \
                           -Dfile="$FILE" \
                           -DrepositoryId=artifactory \
                           -Durl="${ARTIFACTORY_REGISTRY}" \
                           -s ~/.m2/settings.xml \
                           --batch-mode 2>&1; then
                        echo "    ✓ Uploaded EAR to Artifactory"
                        echo "SUCCESS: $GROUP_ID:$ARTIFACT_ID:$VERSION (ear)" >> "$SYNC_LOG"
                      else
                        echo "    ✗ Failed to upload EAR"
                        echo "FAILED (ear upload): $GROUP_ID:$ARTIFACT_ID:$VERSION" >> "$SYNC_LOG"
                      fi
                    elif [[ "$FILENAME" == *.war ]]; then
                      # Deploy main WAR
                      if mvn deploy:deploy-file \
                           -DgroupId="$GROUP_ID" \
                           -DartifactId="$ARTIFACT_ID" \
                           -Dversion="$VERSION" \
                           -Dpackaging=war \
                           -Dfile="$FILE" \
                           -DrepositoryId=artifactory \
                           -Durl="${ARTIFACTORY_REGISTRY}" \
                           -s ~/.m2/settings.xml \
                           --batch-mode 2>&1; then
                        echo "    ✓ Uploaded WAR to Artifactory"
                        echo "SUCCESS: $GROUP_ID:$ARTIFACT_ID:$VERSION (war)" >> "$SYNC_LOG"
                      else
                        echo "    ✗ Failed to upload WAR"
                        echo "FAILED (war upload): $GROUP_ID:$ARTIFACT_ID:$VERSION" >> "$SYNC_LOG"
                      fi
                    fi
                  done
                else
                  echo "    ✗ Failed to download from GitHub"
                  echo "FAILED (download): $GROUP_ID:$ARTIFACT_ID:$VERSION" >> "$SYNC_LOG"
                fi

                # Cleanup
                rm -rf "$TEMP_DIR"

              done <<< "$VERSIONS"

            done <<< "$PACKAGES"

          done

          echo ""
          echo "================================================"
          echo "Maven Sync Summary"
          echo "================================================"
          cat "$SYNC_LOG"

          # Count results
          SUCCESS_COUNT=$(grep -c "^SUCCESS:" "$SYNC_LOG" || if [ "$?" -gt 1 ]; then echo "0"; fi)
          FAILED_COUNT=$(grep -c -E "^FAILED( *\(.*\)):" "$SYNC_LOG" || if [ "$?" -gt 1 ]; then echo "0"; fi)

          echo ""
          echo "Total successful syncs: $SUCCESS_COUNT"
          echo "Total failures: $FAILED_COUNT"

      - name: Upload sync log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maven-sync-log-${{ github.run_number }}
          path: maven-sync-log-*.txt
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          rm -rf ~/.m2/repository/* || true
