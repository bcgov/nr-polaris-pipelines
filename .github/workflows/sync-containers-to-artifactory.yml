name: Sync Containers to Artifactory

on:
  workflow_dispatch:
    inputs:
      repositories:
        description: 'Comma-separated list of repositories to scan (owner/repo)'
        required: false
        default: ''
  # schedule:
  #   # Run daily at 2 AM UTC
  #   - cron: '0 2 * * *'

env:
  GHCR_REGISTRY: ghcr.io
  ARTIFACTORY_URL: ${{ secrets.ARTIFACTORY_URL }}
  ARTIFACTORY_REGISTRY: ${{ secrets.ARTIFACTORY_DOCKER_REGISTRY }}

jobs:
  sync-containers:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up repositories list
        id: setup
        run: |
          if [ -n "${{ github.event.inputs.repositories }}" ]; then
            echo "repositories=${{ github.event.inputs.repositories }}" >> $GITHUB_OUTPUT
          else
            # Default repositories to scan (customize this list)
            echo "repositories=bcgov-c/nr-hbs-daily-data-scan" >> $GITHUB_OUTPUT
          fi

      - name: Setup ORAS
        uses: oras-project/setup-oras@v2

      - name: Scan and sync containers
        env:
          GITHUB_TOKEN: ${{ secrets.GHCR_PAT }}
          REPOSITORIES: ${{ steps.setup.outputs.repositories }}
        run: |
          set -e

          echo "Starting container sync process..."

          # Create sync tracking file
          SYNC_LOG="sync-log-$(date +%Y%m%d-%H%M%S).txt"
          echo "Sync started at $(date)" > "$SYNC_LOG"

          # Split repositories by comma
          IFS=',' read -ra REPO_ARRAY <<< "$REPOSITORIES"

          test_gh_limit_warning() {
            if [ "$1" -ge 10000 ]; then
              echo "::warning ::GitHub API may be limited to 10000 packages"
              echo "See https://docs.github.com/en/rest/packages/packages?apiVersion=2022-11-28"
            fi
          }

          oras login ${{ env.GHCR_REGISTRY }} -u ${{ github.actor }} --password-stdin <<< ${{ secrets.GHCR_PAT }}
          oras login ${{ env.ARTIFACTORY_URL }} -u ${{ secrets.ARTIFACTORY_USERNAME }} --password-stdin <<< ${{ secrets.ARTIFACTORY_PASSWORD }}

          for REPO in "${REPO_ARRAY[@]}"; do
            REPO=$(echo "$REPO" | xargs) # Trim whitespace
            echo "================================================"
            echo "Processing repository: $REPO"
            echo "================================================"

            # Get all packages for the repository
            OWNER=$(echo "$REPO" | cut -d'/' -f1)
            REPO_NAME=$(echo "$REPO" | cut -d'/' -f2)

            # Fetch container packages from GHCR with pagination (accumulate into variable)
            echo "Fetching packages from $REPO (paginated)..."
            PACKAGES=""
            if ! PACKAGES_API_RESPONSE=$(gh api \
              --paginate \
              --slurp \
              --cache 90s \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/orgs/$OWNER/packages?package_type=container" \
              2>/dev/null); then

              echo "::warning ::Unable to fetch org packages"
              echo "Response: $PACKAGES_API_RESPONSE"
              echo "FAILED (org packages api): $OWNER" >> "$SYNC_LOG"

              { read -r ERR_MSG; read -r ERR_STATUS; } < <(jq -r '.[0] | .message, .status' <<< "$PACKAGES_API_RESPONSE")

              if [ "$ERR_MSG" = "Not Found" -a "$ERR_STATUS" -eq 404 ]; then
                echo "No packages found for org $OWNER; trying user packages (paginated)..."
                if ! PACKAGES_API_RESPONSE=$(gh api \
                  --paginate \
                  --slurp \
                  --cache 90s \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "/users/$OWNER/packages?package_type=container" \
                  2>/dev/null); then

                  echo "::warning ::Unable to fetch user packages"
                  echo "Response: $PACKAGES_API_RESPONSE"
                  echo "FAILED (user packages api): $OWNER" >> "$SYNC_LOG"
                  continue
                fi
              else
                continue
              fi
            fi

            test_gh_limit_warning $(jq -r 'reduce .[] as $page (0; . + ($page | length))' <<< "$PACKAGES_API_RESPONSE")
            PACKAGES=$(jq -r '.[].[] | select(.repository.name == "'$REPO_NAME'") | .name' 2>/dev/null <<< "$PACKAGES_API_RESPONSE")

            if [ -z "$PACKAGES" ]; then
              echo "Warning: No container packages found for $REPO"
              echo "$REPO: No packages found" >> "$SYNC_LOG"
              continue
            fi

            # Process each package - loop over variable
            while IFS= read -r PACKAGE; do
              if [ -z "$PACKAGE" ]; then
                continue
              fi

              echo "Processing package: $PACKAGE"

              PACKAGE_URI_ENCODED="$(printf '%s' "$PACKAGE" | jq -sRr @uri)"

              # Get all versions/tags for this package with pagination (accumulate into variable)
              VERSIONS=""
 
              if ! VERSIONS_API_RESPONSE=$(gh api \
                --paginate \
                --slurp \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/orgs/$OWNER/packages/container/$PACKAGE_URI_ENCODED/versions" \
                2>/dev/null); then
      
                echo "::warning ::Unable to fetch org package versions for $OWNER::$PACKAGE"
                echo "Response: $VERSIONS_API_RESPONSE"
                echo "FAILED (org versions api): $OWNER::$PACKAGE" >> "$SYNC_LOG"

                { read -r ERR_MSG; read -r ERR_STATUS; } < <(jq -r '.[0] | .message, .status' <<< "$VERSIONS_API_RESPONSE")

                if [ "$ERR_MSG" = "Not Found" -a "$ERR_STATUS" -eq 404 ]; then
                  echo "No versions found for org $OWNER, trying user packages (paginated)..."

                  if ! VERSIONS_API_RESPONSE=$(gh api \
                    --paginate \
                    --slurp \
                    -H "Accept: application/vnd.github+json" \
                    -H "X-GitHub-Api-Version: 2022-11-28" \
                    "/users/$OWNER/packages/container/$PACKAGE_URI_ENCODED/versions" \
                    2>/dev/null); then

                    echo "::warning ::Unable to fetch user package versions for $OWNER::$PACKAGE"
                    echo "Response: $VERSIONS_API_RESPONSE"
                    echo "FAILED (user versions api): $OWNER::PACKAGE" >> "$SYNC_LOG"
                    continue
                  fi
                else
                  continue
                fi
              fi

              VERSIONS=$(jq '.[].[] | select(.metadata.container.tags | length > 0) | .metadata.container.tags[]' <<< "$VERSIONS_API_RESPONSE")

              if [ -z "$VERSIONS" ]; then
                echo "No tagged versions found for $PACKAGE"
                continue
              fi

              # Sync each tagged version - loop over variable
              while IFS= read -r TAG; do
                if [ -z "$TAG" ]; then
                  continue
                fi

                # Remove quotes from tag
                TAG=$(echo "$TAG" | tr -d '"')

                SOURCE_IMAGE="${GHCR_REGISTRY}/${OWNER}/${PACKAGE}:${TAG}"
                DEST_IMAGE="${ARTIFACTORY_REGISTRY}/${OWNER}/${PACKAGE}:${TAG}"

                echo "Syncing: $SOURCE_IMAGE -> $DEST_IMAGE"

                # Check if image already exists in Artifactory (optional optimization)
                if oras manifest fetch "$DEST_IMAGE" > /dev/null 2>&1; then
                  echo "  ✓ Image already exists in Artifactory, skipping"
                  continue
                fi

                # Copy from GHCR
                if oras cp "$SOURCE_IMAGE" "$DEST_IMAGE"; then
                  echo "  ✓ Copied to Artifactory"
                  echo "SUCCESS: $SOURCE_IMAGE -> $DEST_IMAGE" >> "$SYNC_LOG"
                else
                  echo "  ✗ Failed to copy from GHCR to Artifactory"
                  echo "FAILED (copy): $SOURCE_IMAGE $DEST_IMAGE" >> "$SYNC_LOG"
                fi

              done <<< "$VERSIONS"

            done <<< "$PACKAGES"

          done

          echo ""
          echo "================================================"
          echo "Sync Summary"
          echo "================================================"
          cat "$SYNC_LOG"

          # Count results
          SUCCESS_COUNT=$(grep -c "^SUCCESS:" "$SYNC_LOG" || if [ "$?" -gt 1 ]; then echo "0"; fi)
          FAILED_COUNT=$(grep -c -E "^FAILED( *\(.*\)):" "$SYNC_LOG" || if [ "$?" -gt 1 ]; then echo "0"; fi)

          echo ""
          echo "Total successful syncs: $SUCCESS_COUNT"
          echo "Total failures: $FAILED_COUNT"

      - name: Upload sync log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sync-log-${{ github.run_number }}
          path: sync-log-*.txt
          retention-days: 30

